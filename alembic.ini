# Alembic 主配置文件（数据 PR-1）。
#
# 说明：
# - `script_location` 指向 `app/db/migrations`（决策 §4）。
# - `sqlalchemy.url` 留占位符 `${DB_URL}`；**实际值由 `app/db/migrations/env.py`
#   通过 `app.db.engine.get_database_url()` 现读 `Settings.data_db_path`
#   注入，不从 ini 取值**。
# - `render_as_batch=True` 由 `env.py` 内 `context.configure(...)` 显式设置，
#   见决策 §4；本文件不重复。
#
# 详见 [[40 实施计划/数据模型治理实施计划与PR清单]] PR-1、
# [[50 决策记录/决策 - ORM 与迁移工具选型]] 使用规范 §4。

[alembic]
script_location = app/db/migrations
sqlalchemy.url = ${DB_URL}
# 迁移文件命名模板：`{revision}_{slug}.py`（决策 §4：顺序号 4 位）
file_template = %%(rev)s_%%(slug)s
# 时区留默认（本地）
prepend_sys_path = .

# 迁移执行时的解释器路径由调用方指定；本 ini 不硬编码。
[post_write_hooks]
# 本项目治理期不启用 post_write_hook。

# --------- 日志段（可选） ---------
# 保留最小 loggers 段以便 `fileConfig` 兼容；不启用具体 handler。
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
